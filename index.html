<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="text/css" rel="stylesheet" href="style.css" />
    <title>2 Due App</title>
  </head>
  <body>
    <h1>2 Due App</h1>
    <table>
      <thead>
        <th>Task</th>
        <th>Priority</th>
        <th>Status</th>
      </thead>
      <tbody id="taskTable"></tbody>
    </table>
    <button onclick="location.href = 'addTask.html'" type="button">
      New Task
    </button>
    <button onclick="DeleteTask()" id="delete" type="submit">
      Delete Task
    </button>
    <button onclick="UpdateTask()" id="update" type="button">
      Update Task
    </button>
    <button onclick="ClearTasks()" type="reset">Clear All</button>
    <script type="text/javascript" src="main.js" defer></script>
  </body>
</html>
